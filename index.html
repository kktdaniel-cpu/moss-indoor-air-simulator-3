    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #F8FAFC; 
            color: #334155;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 250px;
        }

        /* Card Hover Effects */
        .product-card {
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .product-card:hover {
            transform: translateY(-2px);
            border-color: #3B82F6;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .product-card.selected {
            border-color: #3B82F6;
            background-color: #EFF6FF;
        }

        /* Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #3B82F6;
            cursor: pointer;
            margin-top: -7px;
            box-shadow: 0 0 2px rgba(0,0,0,0.2);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: #DBEAFE;
            border-radius: 2px;
        }

        .section-header {
            border-left: 4px solid #3B82F6;
            padding-left: 1rem;
            margin-bottom: 1.5rem;
        }

        /* Tab Animation */
        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Proposal Paper Style */
        .proposal-paper {
            background: white;
            padding: 40px;
            min-height: 800px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #e2e8f0;
            position: relative;
        }
        .proposal-paper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #3B82F6, #10B981);
        }

        /* Print Specific Styles */
        @media print {
            body * {
                visibility: hidden;
            }
            #content-proposal, #content-proposal * {
                visibility: visible;
            }
            #content-proposal {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                margin: 0;
                padding: 0;
            }
            .no-print {
                display: none !important;
            }
            .proposal-paper {
                box-shadow: none;
                border: none;
                padding: 0;
            }
            nav, .lg\:col-span-4, .tab-buttons {
                display: none;
            }
        }
    </style>
</head>
